{% extends 'lab3/index.html' %}

{% block content %}

<h1 class="page-title">Laptops</h1>
<p class="page-subtitle">{{ items|length }} model{{ items|length|pluralize }} available</p>

<ul class="laptop-list">
    {% for item in items %}
    <li class="laptop-item">💻 {{ item.name }}</li>
    {% empty %}
    <p class="empty">No laptops in stock yet. Check back soon.</p>
    {% endfor %}
</ul>
{% endblock %}
